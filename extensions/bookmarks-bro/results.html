<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keep It For Me — AI Search Results</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .wrap {
        padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }
      .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      h1 { margin: 0; font-size: 20px; color: #4f46e5; }
      .kpis { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
      .kpi { background: #fff; border: 1px solid #dbe3ef; border-radius: 10px; padding: 8px 10px; }
      .kpi .l { font-size: 11px; color: #64748b; }
      .kpi .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
      .overview { background: #fff; border: 1px solid #dbe3ef; border-radius: 10px; padding: 10px; margin-bottom: 10px; line-height: 1.45; }
      .toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 10px; }
      .toolbar input { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 13px; }
      button { border: none; border-radius: 10px; padding: 10px 12px; min-height: 40px; color: #fff; background: linear-gradient(135deg, #4f46e5, #7c3aed); cursor: pointer; }
      .table-wrap { background: #fff; border: 1px solid #dbe3ef; border-radius: 10px; overflow: auto; max-height: calc(100vh - 250px); }
      table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
      th, td { padding: 8px; border-bottom: 1px solid #eef2f7; text-align: left; vertical-align: top; }
      th { background: #f8fafc; position: sticky; top: 0; z-index: 1; }
      .url { color: #2563eb; text-decoration: none; word-break: break-word; }
      .reason { color: #475569; line-height: 1.35; }
      .actions button { padding: 5px 8px; font-size: 11px; margin-right: 4px; background: #0f172a; }
      .empty { padding: 14px; color: #64748b; }
      .src-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid transparent;
      }
      .src-bookmark {
        background: #dbeafe;
        color: #1d4ed8;
        border-color: #bfdbfe;
      }
      .src-web {
        background: #f3e8ff;
        color: #7e22ce;
        border-color: #e9d5ff;
      }

      @media (max-width: 900px) {
        h1 { font-size: 18px; }
        .kpis { grid-template-columns: 1fr; }
        .toolbar { grid-template-columns: 1fr; }
        .toolbar button { width: 100%; }
        .table-wrap { max-height: calc(100vh - 340px); }
        table { font-size: 12px; }
        th, td { padding: 7px; }
      }

      @media (max-width: 640px) {
        .wrap { padding: 10px; }
        h1 { font-size: 16px; }
        .overview { font-size: 13px; padding: 8px; }
        .kpi .v { font-size: 16px; }
        .table-wrap {
          max-height: none;
          overflow: visible;
          border: none;
          background: transparent;
        }
        table, thead, tbody, tr, th, td { display: block; width: 100%; }
        thead { display: none; }
        tbody { display: grid; gap: 8px; }
        tr {
          background: #fff;
          border: 1px solid #dbe3ef;
          border-radius: 10px;
          padding: 8px;
        }
        td {
          border: none;
          padding: 4px 0;
          font-size: 12px;
        }
        td::before {
          content: attr(data-label);
          display: block;
          font-size: 10px;
          color: #64748b;
          margin-bottom: 2px;
          text-transform: uppercase;
          letter-spacing: 0.03em;
        }
        .actions button {
          min-height: 34px;
          margin-right: 6px;
          margin-top: 4px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>AI Search Results</h1>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="l">Mode</div><div class="v" id="kMode">—</div></div>
        <div class="kpi"><div class="l">Candidates</div><div class="v" id="kCandidates">0</div></div>
        <div class="kpi"><div class="l">Selected</div><div class="v" id="kSelected">0</div></div>
      </div>
      <div class="overview" id="overview">No overview.</div>
      <div class="toolbar">
        <input id="filter" placeholder="Filter by title / url / reason" />
        <button id="copyBtn">Copy summary</button>
        <button id="exportBtn">Export .md</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:28px">#</th>
              <th style="width:80px">Source</th>
              <th style="width:32%">Resource</th>
              <th style="width:80px">Category</th>
              <th style="width:80px">Rel.</th>
              <th>Reason</th>
              <th style="width:110px">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="empty" style="display:none;">No recommendations found.</div>
      </div>
    </div>
    <script src="results.js"></script>
  </body>
</html>
