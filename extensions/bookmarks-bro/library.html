<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookmarks Bro — Library</title>
    <style>
      :root { font-family: system-ui, Arial, sans-serif; color: #0f172a; background: #f8fafc; }
      body { margin: 0; padding: 16px; max-width: 1200px; margin-inline: auto; }
      h1 { font-size: 20px; margin: 0 0 12px; }
      .toolbar {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        align-items: end;
      }
      label span { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; }
      input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 13px; }
      .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      .primary { background: #4f46e5; color: #fff; }
      .secondary { background: #e2e8f0; color: #334155; }
      .muted { font-size: 12px; color: #64748b; margin: 10px 0; }
      .table-wrap {
        overflow: auto;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        margin-top: 12px;
      }
      table { border-collapse: collapse; width: 100%; font-size: 12px; }
      th, td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; text-align: left; vertical-align: top; }
      th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
      tr:hover td { background: #fafafa; }
      a.cell-link { color: #2563eb; word-break: break-all; }
      .tags { font-size: 11px; color: #475569; }
      .pager { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
      #toast { margin-top: 10px; font-size: 13px; white-space: pre-wrap; color: #334155; min-height: 1.5em; }
      .danger { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>Bookmark Library</h1>
    <p class="muted">Filter by categories and tags from enrichment. Select rows to import them into the "Bookmarks Bro Import" folder (Other bookmarks).</p>
    <div class="toolbar">
      <div>
        <label><span>Search</span><input id="q" type="search" placeholder="title, URL, summary" /></label>
      </div>
      <div>
        <label><span>Category</span><select id="category"><option value="">— any —</option></select></label>
      </div>
      <div>
        <label><span>Tag</span><select id="tag"><option value="">— any —</option></select></label>
      </div>
      <div>
        <label><span>Fetch status</span><select id="fetchStatus">
          <option value="">— any —</option>
          <option value="ok">ok</option>
          <option value="failed">failed</option>
          <option value="blocked">blocked</option>
          <option value="pending">pending</option>
        </select></label>
      </div>
      <div>
        <label><span>Sort by</span><select id="sort">
          <option value="updated">Last Updated</option>
          <option value="title">Title</option>
          <option value="created">Date Created</option>
        </select></label>
      </div>
      <div>
        <label><span>Order</span><select id="order">
          <option value="desc">Descending</option>
          <option value="asc">Ascending</option>
        </select></label>
      </div>
    </div>
    <div class="btn-row">
      <button type="button" class="primary" id="loadBtn">Reload</button>
      <button type="button" class="secondary" id="importBtn">Import selected to browser</button>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
        <input type="checkbox" id="selectAll" /> Select all on page
      </label>
    </div>
    <div id="toast"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:32px;"></th>
            <th>Title / URL</th>
            <th>Category</th>
            <th>Tags</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button type="button" class="secondary" id="prevBtn">Prev</button>
      <span id="pageInfo"></span>
      <button type="button" class="secondary" id="nextBtn">Next</button>
    </div>
    <script src="extension-config.js"></script>
    <script src="library.js"></script>
  </body>
</html>
