name: Keept staging smoke

on:
  workflow_dispatch:
  push:
    branches: [main, bookmarks-bro]
    paths:
      - 'agent-api/**'
      - 'src/bookmarksBro/**'
      - 'src/keeptAdmin/**'
      - 'extensions/bookmarks-bro/**'
      - 'scripts/bookmarks-bro-api-test.mjs'
      - 'scripts/bookmarks-bro-smoke.mjs'
      - '.github/workflows/keept-staging-smoke.yml'

jobs:
  checklist-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Static smoke checklist
        run: node scripts/bookmarks-bro-smoke.mjs

  api-smoke:
    runs-on: ubuntu-latest
    needs: checklist-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip notice when API key is not configured
        id: gate
        env:
          API_KEY: ${{ secrets.KEEPT_BOOKMARKS_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=API smoke skipped::Set repo secret KEEPT_BOOKMARKS_API_KEY to enable live staging API smoke."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bookmarks Bro API smoke (staging)
        if: steps.gate.outputs.skip != 'true'
        env:
          AGENT_API_BASE: ${{ vars.KEEPT_STAGING_API_BASE || 'https://swoop.autoro.tech' }}
          VITE_BOOKMARKS_API_KEY: ${{ secrets.KEEPT_BOOKMARKS_API_KEY }}
        run: node scripts/bookmarks-bro-api-test.mjs
