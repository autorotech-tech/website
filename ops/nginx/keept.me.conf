# Keept Admin — nginx vhost template (origin VPS)

Copy to `/etc/nginx/sites-available/keept.me` on `46.250.228.229` after Cloudflare DNS is proxied.
Use Cloudflare Origin Certificate paths from [CLOUDFLARE-KEEPT-DNS.md](../docs/bookmarks-bro/CLOUDFLARE-KEEPT-DNS.md).

```nginx
# User app
server {
    listen 443 ssl http2;
    server_name app.keept.me;

    ssl_certificate     /etc/ssl/cloudflare/keept.me.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keept.me.key;

    root /var/www/autoro-website/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin (same SPA)
server {
    listen 443 ssl http2;
    server_name admin.keept.me;

    ssl_certificate     /etc/ssl/cloudflare/keept.me.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keept.me.key;

    root /var/www/autoro-website/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# BB Supabase Kong
server {
    listen 443 ssl http2;
    server_name auth.keept.me;

    ssl_certificate     /etc/ssl/cloudflare/keept.me.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keept.me.key;

    location / {
        proxy_pass http://127.0.0.1:54325/;
        proxy_http_version 1.1;
        proxy_set_header Connection close;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Apex redirect
server {
    listen 443 ssl http2;
    server_name keept.me www.keept.me;

    ssl_certificate     /etc/ssl/cloudflare/keept.me.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keept.me.key;

    return 302 https://app.keept.me$request_uri;
}
```

Until keept.me DNS is live, use staging:

- App: `https://swoop.autoro.tech/bookmarks-bro`
- Admin: `https://swoop.autoro.tech/keept/admin`
