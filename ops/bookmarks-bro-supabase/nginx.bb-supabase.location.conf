# Добавить в server {} на хосте swoop/autoro frontend nginx.
# Проксирует отдельный Supabase-Kong для Bookmarks Bro.

location /bb-supabase/ {
    # Новый отдельный Kong, поднятый bootstrap.sh на порту 54325
    proxy_pass http://127.0.0.1:54325/;
    proxy_http_version 1.1;
    proxy_set_header Connection close;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

